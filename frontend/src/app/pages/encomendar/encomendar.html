<section class="container-encomendar h-full">
  <div class="bg-light-color h-full w-full">
    <fieldset class="container-inputs">
      <!-- class="flex justify-center items-center text-3xl" -->
      <p-card header="{{ messages['novo.orcamento'] }}">
        <span>{{ messages['insira.dados.evento'] }}</span>

        <div class="input-nome-evento">
          <label for="ipt-nome-evento">{{ messages['nome'] }}</label>
          <input
            pInputText
            id="ipt-nome-evento"
            autocomplete="off"
            [value]="this.encomendarForm().nome"
            (input)="formUtils.updateField(this.encomendarForm, 'nome', $event.target.value)"
          />
        </div>

        <div class="input-data-evento">
          <label for="ipt-data-evento">{{ messages['data'] }}</label>
          <p-datepicker
            inputId="ipt-data-evento"
            showIcon
            iconDisplay="input"
            dateFormat="dd/mm/yy"
            (onSelect)="onSelectDataEvento($event)"
          />
        </div>

        <div class="input-tipo-evento card flex justify-center">
          <label for="select-tipo-evento">{{ messages['tipo'] }}</label>
          <p-select
            class="w-full"
            inputId="select-tipo-evento"
            [options]="tipoEventoList"
            optionLabel="nome"
            (onChange)="this.formUtils.updateField(this.encomendarForm, 'tipoEvento', $event.value)"
          />
        </div>

        <div class="input-quantidade-convidados">
          <label for="ipt-quantidade-convidados">{{ messages['quantidade.convidados'] }}</label>
          <p-inputnumber
            inputId="ipt-quantidade-convidados"
            [showClear]="true"
            for="integeronly"
            [min]="0"
            (onInput)="onInputNumeroConvidados($event)"
          />
        </div>

        <div class="input-observacoes">
          <label for="textarea-observacoes">{{ messages['observacoes'] }}</label>
          <textarea
            pTextarea
            id="textarea-observacoes"
            rows="5"
            cols="30"
            style="resize: none"
            class="h-full"
            fluid
            [value]="this.encomendarForm().observacoes"
            (input)="onObservacoesChange($event)"
          ></textarea>
        </div>
      </p-card>
    </fieldset>
  </div>
</section>
