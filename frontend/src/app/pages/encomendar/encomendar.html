<section class="flex justify-center items-start w-full h-full py-6 px-4 bg-darker-white">
  <div class="w-full max-w-7xl">
    <span class="text-5xl font-bold! block pb-4 text-black! text-center">
      {{ messages['encomendar'] }}
    </span>

    <p-card>
      <span class="block mb-6 text-gray-600 text-lg">
        {{ messages['insira.dados.evento'] }}
      </span>

      <div class="flex flex-col mb-4">
        <label for="ipt-nome-evento" class="mb-2 font-bold!">
          {{ messages['nome'] }}
        </label>
        <input
          pInputText
          id="ipt-nome-evento"
          class="w-full"
          autocomplete="off"
          [value]="this.encomendarForm().nome"
          (input)="formUtils.updateField(this.encomendarForm, 'nome', $event.target.value)"
          placeholder="{{ messages['informe.nome.seu.evento'] }}"
        />
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
        <div class="flex flex-col">
          <label for="ipt-data-evento" class="mb-2 font-bold!">
            {{ messages['data'] }}
          </label>
          <p-datepicker
            inputId="ipt-data-evento"
            showIcon
            iconDisplay="input"
            dateFormat="dd/mm/yy"
            class="w-full"
            (onSelect)="onSelectDataEvento($event)"
            placeholder="{{ messages['selecione.data.evento'] }}"
          />
        </div>

        <div class="flex flex-col">
          <label id="select-tipo-evento" class="mb-2 font-bold!">
            {{ messages['tipo'] }}
          </label>
          <p-select
            class="w-full"
            aria-labelledby="label-tipo-evento"
            inputId="select-tipo-evento"
            [options]="tipoEventoList"
            optionLabel="nome"
            placeholder="Selecione o tipo"
            (onChange)="this.formUtils.updateField(this.encomendarForm, 'tipoEvento', $event.value)"
          />
        </div>
      </div>

      <div class="flex flex-col mb-4">
        <label for="ipt-quantidade-convidados" class="mb-2 font-bold!">
          {{ messages['quantidade.convidados'] }}
        </label>
        <p-inputnumber
          inputId="ipt-quantidade-convidados"
          class="w-full"
          [min]="0"
          placeholder="Ex: 50"
          (onInput)="onInputNumeroConvidados($event)"
        />
      </div>

      <div class="flex flex-col mb-6">
        <label for="textarea-observacoes" class="mb-2 font-bold!">
          {{ messages['observacoes'] }}
        </label>
        <textarea
          pTextarea
          id="textarea-observacoes"
          rows="4"
          class="w-full border border-zinc rounded-md bg-zinc-950"
          [value]="this.encomendarForm().observacoes"
          (input)="onObservacoesChange($event)"
        ></textarea>
      </div>

      <div class="flex flex-col md:flex-row gap-4">
        <button
          pButton
          type="button"
          [raised]="true"
          icon="pi pi-check-circle"
          class="w-full md:w-1/2 btn-salvar"
          label="{{ messages['salvar.encomenda'] }}"
        ></button>

        <button
          pButton
          type="button"
          severity="secondary"
          [raised]="true"
          variant="outlined"
          icon="pi pi-trash"
          class="w-full md:w-1/2 btn-limpar"
          label="{{ messages['limpar'] }}"
        ></button>
      </div>
    </p-card>
  </div>
</section>
