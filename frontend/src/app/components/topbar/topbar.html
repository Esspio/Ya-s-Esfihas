<section
  class="flex flex-col md:flex-row items-center border-b border-black w-full bg-surface-color"
>
  <div id="container-logo" class="w-full md:w-1/6 h-auto mx-auto md:mx-0 pb-1">
    <img src="assets/png/logo-no-bg.png" alt="Logo" class="max-w-[70%]py-2 md:px-2" />
  </div>

  <div id="container-searchbar" class="flex justify-center items-center w-full md:w-3/6">
    <p-autocomplete
      name="autocomplete-searchbar"
      class="w-1/2"
      placeholder="{{ messages['pesquisar'] }}"
      dropdownIcon="pi pi-search"
      [dropdown]="true"
      [(ngModel)]="value"
      [suggestions]="items2"
      (completeMethod)="search($event)"
    />
  </div>

  <div class="container-nome-app flex justify-center items-center py-4 w-full md:w-2/6">
    <span class="text-6xl text-black font-extrabold tracking-wide">{{
      messages['yas.esfihas']
    }}</span>
  </div>
</section>
